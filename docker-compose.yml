# SOCKS6-сервер и клиент в Docker.
#
# Сервер: docker/env.example → .env, каталог certs/
# Клиент: docker/client.env.example → .env.client
#
# Только сервер:        docker compose up -d --build
# Сервер + клиент:      docker compose --profile client up -d --build
# Только собрать образы docker compose build

services:
  socks6:
    build:
      context: .
      dockerfile: Dockerfile
      target: server
    image: socks6:local
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${SOCKS6_PUBLISH:-443}:443"
    volumes:
      - ${SOCKS6_CERT_DIR:-./certs}:/certs:ro

  socks6-client:
    profiles:
      - client
    build:
      context: .
      dockerfile: Dockerfile
      target: client
    image: socks6-client:local
    restart: unless-stopped
    env_file:
      - .env.client
    ports:
      - "${CLIENT_PUBLISH:-1080}:1080"
